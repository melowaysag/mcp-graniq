name: Feature request
description: Suggest an improvement to @graniq/mcp
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What can't you do today?
    validations: { required: true }
  - type: textarea
    attributes:
      label: Proposed solution
    validations: { required: true }
  - type: textarea
    attributes:
      label: Alternatives considered
