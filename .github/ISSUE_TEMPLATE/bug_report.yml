name: Bug report
description: Something is broken with @graniq/mcp
labels: [bug]
body:
  - type: input
    attributes:
      label: graniq-mcp version
      placeholder: "0.1.0"
    validations: { required: true }
  - type: input
    attributes:
      label: Node version
      placeholder: "20.11.0"
    validations: { required: true }
  - type: input
    attributes:
      label: OS
      placeholder: "macOS 14 / Windows 11 / Ubuntu 22.04"
    validations: { required: true }
  - type: dropdown
    attributes:
      label: MCP client
      options: [Claude Desktop, Cursor, Windsurf, VS Code, ChatGPT, Other / programmatic]
    validations: { required: true }
  - type: textarea
    attributes:
      label: Steps to reproduce
    validations: { required: true }
  - type: textarea
    attributes:
      label: Expected vs actual
    validations: { required: true }
  - type: textarea
    attributes:
      label: graniq-mcp diagnose output
      description: Run `graniq-mcp diagnose --out=bundle.json` and paste the JSON here.
      render: json
